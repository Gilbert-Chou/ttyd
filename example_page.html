<!DOCTYPE html>
<html>
<head>
    <title>Parent Control Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        iframe { width: 100%; height: 400px; border: 2px solid #333; }
        .controls { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>1. Parent Control Panel</h2>
    <div class="controls">
        <input type="text" id="cmdInput" value="echo 'Hello from Parent!'">
        <button onclick="send()">Send Command</button>
    </div>

    <iframe id="ttydFrame" src="https://your-ttyd-domain.com"></iframe>

    <script>
        function send() {
            const msg = document.getElementById('cmdInput').value;
            const frame = document.getElementById('ttydFrame');
            
            console.log("Parent window: preparing to send message...", msg);
            
            frame.contentWindow.postMessage({
                type: 'INPUT',
                text: msg
            }, '*'); 
        }
    </script>
</body>
</html>
